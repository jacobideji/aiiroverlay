name: Crosswalk request
description: Request a mapping from AI IR Overlay to another framework (SOC 2, HIPAA, CIS, ENISA, etc.)
title: "[crosswalk]: "
labels: ["crosswalk", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Crosswalks make the framework usable in regulated environments. See existing examples under `crosswalks/`.
  - type: input
    id: target
    attributes:
      label: Target framework
      placeholder: "SOC 2 Type II"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Target framework version (if applicable)
      placeholder: "2017 TSC, revised 2022"
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why do you need this crosswalk? What audit, regulator conversation, or board question is driving it?
    validations:
      required: true
  - type: textarea
    id: known-mappings
    attributes:
      label: Known mappings (if any)
      description: List any AI IR Overlay ↔ target-framework mappings you have already identified. Gap notes welcome.
