name: Bug report
description: Report a factual error, broken link, conflicting guidance, or lint warning
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. For security vulnerabilities, please use a [private security advisory](https://github.com/jacobideji/aiiroverlay/security/advisories/new) instead.
  - type: input
    id: file
    attributes:
      label: Affected file
      description: Path of the file containing the issue.
      placeholder: framework/01-minimum-viable-overlay.md
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is wrong?
      description: Describe the bug — what you expected vs. what you found. Quote the problematic text if relevant.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Release tag (e.g., v0.1.3) or commit SHA where you observed the issue.
      placeholder: v0.1.3
  - type: textarea
    id: suggested-fix
    attributes:
      label: Suggested fix (optional)
      description: If you have a proposed correction, paste it here. PRs are welcome — see CONTRIBUTING.md.
